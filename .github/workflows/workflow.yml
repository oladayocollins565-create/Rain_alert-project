name: Send Weather Alert

on:
  schedule:
    - cron: '00 05 * * *'
  workflow_dispatch:

jobs:
  weather-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run script
        run: |
          python main.py
